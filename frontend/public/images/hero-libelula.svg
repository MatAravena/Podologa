<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none" role="img" aria-label="Ilustración decorativa libélula y pie">

  <!-- Fondo circular cálido -->
  <circle cx="240" cy="240" r="230" fill="#F5EDE0" opacity="0.6"/>
  <circle cx="240" cy="240" r="200" fill="#EAD8C5" opacity="0.4"/>

  <!-- ── LIBÉLULA ── -->
  <!-- Cuerpo de la libélula -->
  <ellipse cx="240" cy="195" rx="7" ry="52" fill="#8B4C2A" opacity="0.85"/>
  <!-- Cabeza -->
  <circle cx="240" cy="138" r="11" fill="#8B4C2A" opacity="0.9"/>
  <!-- Ojos -->
  <circle cx="235" cy="135" r="3.5" fill="#FAF6F0"/>
  <circle cx="245" cy="135" r="3.5" fill="#FAF6F0"/>

  <!-- Ala superior izquierda -->
  <ellipse cx="185" cy="165" rx="52" ry="22" fill="#C07753" opacity="0.35" transform="rotate(-20 185 165)"/>
  <!-- Ala superior derecha -->
  <ellipse cx="295" cy="165" rx="52" ry="22" fill="#C07753" opacity="0.35" transform="rotate(20 295 165)"/>
  <!-- Ala inferior izquierda -->
  <ellipse cx="190" cy="195" rx="42" ry="16" fill="#DFB89E" opacity="0.4" transform="rotate(-15 190 195)"/>
  <!-- Ala inferior derecha -->
  <ellipse cx="290" cy="195" rx="42" ry="16" fill="#DFB89E" opacity="0.4" transform="rotate(15 290 195)"/>

  <!-- Detalles venación alas -->
  <line x1="240" y1="148" x2="148" y2="160" stroke="#8B4C2A" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="148" x2="332" y2="160" stroke="#8B4C2A" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="160" x2="162" y2="190" stroke="#8B4C2A" stroke-width="0.7" opacity="0.25"/>
  <line x1="240" y1="160" x2="318" y2="190" stroke="#8B4C2A" stroke-width="0.7" opacity="0.25"/>

  <!-- Antenas -->
  <line x1="236" y1="128" x2="222" y2="112" stroke="#8B4C2A" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="244" y1="128" x2="258" y2="112" stroke="#8B4C2A" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="221" cy="111" r="2.5" fill="#C07753" opacity="0.8"/>
  <circle cx="259" cy="111" r="2.5" fill="#C07753" opacity="0.8"/>

  <!-- ── PIE ESTILIZADO ── -->
  <!-- Planta del pie (forma orgánica suave) -->
  <path d="M175,310 Q165,290 168,268 Q172,245 185,240 Q200,235 215,245 Q228,252 230,268
           Q232,280 228,295 Q245,285 258,282 Q272,280 278,290 Q284,305 272,315
           Q260,325 245,322 Q235,320 228,315 Q220,328 210,335
           Q195,345 183,338 Q170,330 175,310 Z"
        fill="#C07753" opacity="0.25"/>
  <path d="M175,310 Q165,290 168,268 Q172,245 185,240 Q200,235 215,245 Q228,252 230,268
           Q232,280 228,295 Q245,285 258,282 Q272,280 278,290 Q284,305 272,315
           Q260,325 245,322 Q235,320 228,315 Q220,328 210,335
           Q195,345 183,338 Q170,330 175,310 Z"
        stroke="#8B4C2A" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Dedos del pie -->
  <!-- Dedo gordo -->
  <ellipse cx="228" cy="256" rx="10" ry="14" fill="#DFB89E" opacity="0.5" transform="rotate(-10 228 256)"/>
  <ellipse cx="228" cy="256" rx="10" ry="14" stroke="#8B4C2A" stroke-width="1" fill="none" opacity="0.4" transform="rotate(-10 228 256)"/>
  <!-- 2do dedo -->
  <ellipse cx="214" cy="248" rx="8" ry="13" fill="#DFB89E" opacity="0.45" transform="rotate(-15 214 248)"/>
  <ellipse cx="214" cy="248" rx="8" ry="13" stroke="#8B4C2A" stroke-width="1" fill="none" opacity="0.35" transform="rotate(-15 214 248)"/>
  <!-- 3er dedo -->
  <ellipse cx="200" cy="246" rx="7" ry="12" fill="#DFB89E" opacity="0.4" transform="rotate(-18 200 246)"/>
  <ellipse cx="200" cy="246" rx="7" ry="12" stroke="#8B4C2A" stroke-width="1" fill="none" opacity="0.3" transform="rotate(-18 200 246)"/>
  <!-- 4to dedo -->
  <ellipse cx="188" cy="250" rx="6" ry="11" fill="#DFB89E" opacity="0.4" transform="rotate(-22 188 250)"/>
  <!-- 5to dedo -->
  <ellipse cx="178" cy="260" rx="5" ry="10" fill="#DFB89E" opacity="0.35" transform="rotate(-28 178 260)"/>

  <!-- ── ELEMENTOS DECORATIVOS ── -->
  <!-- Flores pequeñas -->
  <circle cx="310" cy="270" r="5" fill="#7BAF7A" opacity="0.5"/>
  <circle cx="318" cy="262" r="3.5" fill="#7BAF7A" opacity="0.4"/>
  <circle cx="304" cy="260" r="3" fill="#DFB89E" opacity="0.6"/>

  <circle cx="155" cy="350" r="4" fill="#7BAF7A" opacity="0.45"/>
  <circle cx="148" cy="342" r="3" fill="#DFB89E" opacity="0.5"/>

  <!-- Hojas decorativas -->
  <ellipse cx="325" cy="300" rx="12" ry="5" fill="#7BAF7A" opacity="0.35" transform="rotate(30 325 300)"/>
  <ellipse cx="320" cy="310" rx="10" ry="4" fill="#7BAF7A" opacity="0.3" transform="rotate(-20 320 310)"/>

  <ellipse cx="148" cy="370" rx="10" ry="4" fill="#7BAF7A" opacity="0.35" transform="rotate(40 148 370)"/>

  <!-- Puntos decorativos dispersos -->
  <circle cx="290" cy="360" r="3" fill="#C07753" opacity="0.3"/>
  <circle cx="170" cy="230" r="2.5" fill="#C07753" opacity="0.25"/>
  <circle cx="305" cy="230" r="2" fill="#7BAF7A" opacity="0.35"/>
  <circle cx="160" cy="300" r="2" fill="#8B4C2A" opacity="0.2"/>

  <!-- Línea decorativa curva inferior -->
  <path d="M130,390 Q240,370 350,390" stroke="#C07753" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="4 4"/>

</svg>
